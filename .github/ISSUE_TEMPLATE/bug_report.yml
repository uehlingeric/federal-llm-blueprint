name: Bug Report
description: Report a bug in the Terraform modules or examples
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: dropdown
    id: component
    attributes:
      label: Component Affected
      description: Which module or example does this affect?
      options:
        - kms
        - network
        - iam
        - ecs-llm-gateway
        - vector-store
        - document-store
        - audit
        - observability
        - examples/minimal
        - examples/full-stack
        - docs
        - other
    validations:
      required: true

  - type: input
    id: terraform_version
    attributes:
      label: Terraform Version
      description: Output of `terraform version`
      placeholder: "e.g., Terraform v1.9.8"
    validations:
      required: true

  - type: input
    id: aws_provider_version
    attributes:
      label: AWS Provider Version
      description: Version constraint from your terraform code (e.g., from versions.tf)
      placeholder: "e.g., ~> 6.0"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What Happened
      description: Describe the issue and how to reproduce it
      placeholder: "When I run `make validate`, the error is..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
      placeholder: "The module should create the KMS key without errors"
    validations:
      required: true

  - type: textarea
    id: minimal_config
    attributes:
      label: Minimal Configuration or Plan Output
      description: Paste a minimal Terraform configuration that reproduces the issue, or the output of `terraform plan`
      render: hcl
    validations:
      required: false
